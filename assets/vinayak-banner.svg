<svg width="860" height="200" viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Vinayak Singh — Full-Stack Developer | MERN | System Design</title>
  <desc>Professional GitHub profile banner for Vinayak Singh</desc>
  <defs>
    <linearGradient id="vbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="vlineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="vnameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6ee7b7"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    <filter id="vglow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Inter:wght@400;600;700&amp;display=swap');
    .vn { font-family: 'Inter', sans-serif; font-size: 48px; font-weight: 700; fill: url(#vnameGrad); filter: url(#vglow); opacity: 0; animation: vFSU 0.8s ease forwards 0.2s; }
    .vs { font-family: 'JetBrains Mono', monospace; font-size: 14px; fill: #94a3b8; opacity: 0; animation: vFSU 0.8s ease forwards 0.5s; }
    .vt { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #10b981; opacity: 0; }
    .vtb { fill: #10b98118; stroke: #10b98138; stroke-width: 0.5; opacity: 0; }
    .vt1 { animation: vFP 0.5s ease forwards 0.9s; }
    .vt2 { animation: vFP 0.5s ease forwards 1.1s; }
    .vt3 { animation: vFP 0.5s ease forwards 1.3s; }
    .vt4 { animation: vFP 0.5s ease forwards 1.5s; }
    .vt5 { animation: vFP 0.5s ease forwards 1.7s; }
    .vt6 { animation: vFP 0.5s ease forwards 1.9s; }
    .vdiv { opacity: 0; animation: vGL 0.6s ease forwards 0.7s; }
    .vd { opacity: 0; animation: vFP 0.4s ease forwards; }
    .vd1 { animation-delay: 0.3s; fill: #10b981; }
    .vd2 { animation-delay: 0.5s; fill: #3b82f6; }
    .vd3 { animation-delay: 0.7s; fill: #f59e0b; }
    .vgl { stroke: #1e293b; stroke-width: 0.5; opacity: 0.6; }
    .vbr { fill: none; stroke-width: 1.5; stroke-linecap: square; opacity: 0; animation: vFI 0.6s ease forwards 0.1s; }
    .vbtl { stroke: #10b981; }
    .vbbr { stroke: #3b82f6; }
    .vol { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #10b981; opacity: 0; animation: vFP 0.5s ease forwards 2.1s; }
    .vod { fill: #10b981; opacity: 0; animation: vFP 0.5s ease forwards 2.1s; }
    .vcb { opacity: 0; animation: vFI 0.8s ease forwards 0.6s; }
    @keyframes vFSU { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes vFP { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
    @keyframes vGL { from { opacity: 0; transform: scaleX(0); } to { opacity: 1; transform: scaleX(1); } }
    @keyframes vFI { from { opacity: 0; } to { opacity: 1; } }
    @keyframes vPulse { 0% { opacity: 0; r: 5; } 40% { opacity: 0.55; } 100% { opacity: 0; r: 15; } }
  </style>

  <rect width="860" height="200" fill="url(#vbg)"/>

  <line x1="0" y1="40" x2="860" y2="40" class="vgl"/>
  <line x1="0" y1="80" x2="860" y2="80" class="vgl"/>
  <line x1="0" y1="120" x2="860" y2="120" class="vgl"/>
  <line x1="0" y1="160" x2="860" y2="160" class="vgl"/>
  <line x1="200" y1="0" x2="200" y2="200" class="vgl"/>
  <line x1="400" y1="0" x2="400" y2="200" class="vgl"/>
  <line x1="600" y1="0" x2="600" y2="200" class="vgl"/>
  <line x1="800" y1="0" x2="800" y2="200" class="vgl"/>

  <polyline points="42,18 18,18 18,42" class="vbr vbtl"/>
  <polyline points="818,158 842,158 842,182" class="vbr vbbr"/>

  <circle cx="810" cy="18" r="4.5" class="vd vd3"/>
  <circle cx="825" cy="18" r="4.5" class="vd vd2"/>
  <circle cx="840" cy="18" r="4.5" class="vd vd1"/>

  <text x="55" y="88" class="vn">Vinayak Singh</text>

  <line x1="55" y1="102" x2="462" y2="102" stroke="url(#vlineGrad)" stroke-width="1" class="vdiv"/>

  <text x="55" y="122" class="vs">Full-Stack Developer · MERN · System Design</text>

  <rect x="55"  y="138" width="62" height="20" rx="4" class="vtb vt1"/>
  <text x="65"  y="152" class="vt vt1">Node.js</text>

  <rect x="124" y="138" width="50" height="20" rx="4" class="vtb vt2"/>
  <text x="134" y="152" class="vt vt2">React</text>

  <rect x="181" y="138" width="70" height="20" rx="4" class="vtb vt3"/>
  <text x="191" y="152" class="vt vt3">MongoDB</text>

  <rect x="258" y="138" width="48" height="20" rx="4" class="vtb vt4"/>
  <text x="268" y="152" class="vt vt4">Redis</text>

  <rect x="313" y="138" width="70" height="20" rx="4" class="vtb vt5"/>
  <text x="323" y="152" class="vt vt5">Socket.io</text>

  <rect x="390" y="138" width="36" height="20" rx="4" class="vtb vt6"/>
  <text x="400" y="152" class="vt vt6">JWT</text>

  <circle cx="57" cy="182" r="4" class="vod"/>
  <circle cx="57" cy="182" r="5" fill="none" stroke="#10b981" stroke-width="1" style="opacity:0;animation:vPulse 2s ease-in-out infinite 2.3s;"/>
  <text x="68" y="186" class="vol">open to opportunities</text>

  <g class="vcb">
    <rect x="532" y="18" width="304" height="162" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <circle cx="550" cy="33" r="4" fill="#ff5f57"/>
    <circle cx="564" cy="33" r="4" fill="#febc2e"/>
    <circle cx="578" cy="33" r="4" fill="#28c840"/>
    <text x="598" y="38" font-family="JetBrains Mono, monospace" font-size="10" fill="#6e7681">// stack.js</text>
    <line x1="532" y1="45" x2="836" y2="45" stroke="#30363d" stroke-width="0.5"/>
    <text x="548" y="63" font-family="JetBrains Mono, monospace" font-size="11"><tspan fill="#ff7b72">const </tspan><tspan fill="#79c0ff">dev</tspan><tspan fill="#c9d1d9"> = {</tspan></text>
    <text x="562" y="80" font-family="JetBrains Mono, monospace" font-size="11"><tspan fill="#8b949e">frontend: </tspan><tspan fill="#a5d6ff">'React + TS'</tspan><tspan fill="#c9d1d9">,</tspan></text>
    <text x="562" y="97" font-family="JetBrains Mono, monospace" font-size="11"><tspan fill="#8b949e">backend: </tspan><tspan fill="#a5d6ff">'Node + Express'</tspan><tspan fill="#c9d1d9">,</tspan></text>
    <text x="562" y="114" font-family="JetBrains Mono, monospace" font-size="11"><tspan fill="#8b949e">db: </tspan><tspan fill="#a5d6ff">'MongoDB + Redis'</tspan><tspan fill="#c9d1d9">,</tspan></text>
    <text x="562" y="131" font-family="JetBrains Mono, monospace" font-size="11"><tspan fill="#8b949e">rt: </tspan><tspan fill="#a5d6ff">'Socket.io'</tspan></text>
    <text x="548" y="152" font-family="JetBrains Mono, monospace" font-size="11" fill="#c9d1d9">}</text>
  </g>
</svg>
